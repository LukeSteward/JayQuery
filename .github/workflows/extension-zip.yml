# Builds a distributable Chrome MV3 zip (WXT) and uploads it as a workflow artifact.
# Download: repo → Actions → latest run → Artifacts. Unzip, then chrome://extensions → Load unpacked → select the extracted folder.
#
# GitHub Release (automatic on main):
#   1. Bump "version" in package.json, commit, and push to main.
#   2. This workflow builds the zip. If there is no tag v{version} on the remote yet,
#      it creates that tag on the pushed commit, publishes a Release, and attaches the zip
#      with GitHub-generated release notes (PRs) plus a ## Commits section built from
#      non-merge commit subjects since the previous v* tag (covers direct pushes to main).
#   3. Pushes that only change code but not version (tag already exists) still build the
#      artifact but skip the release job.

name: Extension zip

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: extension-zip-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      should_release: ${{ steps.tag_check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v6

      - id: pkg
        name: Read package version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - id: tag_check
        name: Check if release tag already exists
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          REF="refs/tags/v${VERSION}"
          if [ -n "$(git ls-remote origin "${REF}")" ]; then
            echo "Remote ${REF} already exists — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No ${REF} on remote — will create release and tag."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Produce extension zip (Chrome MV3)
        run: npm run zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: jayquery-chrome-mv3
          include-hidden-files: true
          path: .output/*.zip
          if-no-files-found: error

  release:
    needs: build
    if: needs.build.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Write commit subjects for release notes
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          # Greatest existing v* tag strictly before v$VERSION (semver), so the log range
          # stays correct even if the repo has out-of-order tags.
          PREV=""
          CURRENT="v${VERSION}"
          while IFS= read -r t; do
            [ "${t}" = "${CURRENT}" ] && continue
            FIRST=$(printf '%s\n' "${t}" "${CURRENT}" | sort -V | head -1)
            [ "${FIRST}" = "${t}" ] && PREV="${t}"
          done < <(git tag -l 'v*' | sort -V)
          {
            echo "## Commits"
            echo ""
            if [ -z "${PREV}" ]; then
              git log --pretty=format:'- %s (%h)' --no-merges --reverse "${GITHUB_SHA}"
            else
              git log --pretty=format:'- %s (%h)' --no-merges --reverse "${PREV}..${GITHUB_SHA}"
            fi
            echo ""
          } > release-notes-extra.md

      - name: Download zip artifact
        uses: actions/download-artifact@v8
        with:
          name: jayquery-chrome-mv3
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes-extra.md
          files: release-assets/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
