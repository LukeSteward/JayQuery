# Builds a distributable Chrome MV3 zip (WXT) and uploads it as a workflow artifact.
# Download: repo → Actions → latest run → Artifacts. Unzip, then chrome://extensions → Load unpacked → select the extracted folder.
#
# GitHub Release (tag only):
#   1. Set "version" in package.json and commit to main.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z   (tag must be v{version} or the workflow fails)
#   3. The release job attaches the zip and uses GitHub-generated release notes.
#   workflow_dispatch and push to main only produce the artifact, not a Release.

name: Extension zip

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: extension-zip-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag \"$TAG\" must equal package.json version as v-prefix (expected \"$EXPECTED\")."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Produce extension zip (Chrome MV3)
        run: npm run zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: jayquery-chrome-mv3
          include-hidden-files: true
          path: .output/*.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v8
        with:
          name: jayquery-chrome-mv3
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
